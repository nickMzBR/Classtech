<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classtech Hub</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --blue: #007aff;
            --text: #ffffff;
            --text-dim: #888;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Titulozinho no canto */
        .brand {
            position: absolute;
            top: 20px;
            left: 25px;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: -1px;
            color: var(--blue);
            text-transform: lowercase;
        }

        .main-wrapper {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            animation: fadeIn 0.8s ease;
        }

        header { margin-bottom: 30px; text-align: center; }
        header h2 { font-size: 1.4rem; margin: 0; font-weight: 600; }
        header p { font-size: 0.85rem; color: var(--text-dim); margin-top: 5px; }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .plan-card {
            background: var(--card);
            padding: 20px;
            border-radius: 18px;
            border: 1px solid #2a2a2a;
            transition: 0.3s;
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .plan-card:hover {
            border-color: var(--blue);
            transform: translateY(-3px);
            background: #252525;
        }

        .plan-name { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; font-weight: bold; }
        .plan-price { font-size: 1.5rem; font-weight: 700; margin: 10px 0; }
        .plan-price span { font-size: 0.8rem; font-weight: normal; color: #555; }

        .features {
            list-style: none;
            padding: 0;
            margin: 10px 0 20px 0;
            font-size: 0.8rem;
            line-height: 1.5;
            color: #bbb;
        }

        .btn-pay {
            background: #2a2a2a;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .plan-card:hover .btn-pay { background: var(--blue); }

        /* Modal Pagamento */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .payment-box {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 24px;
            width: 280px;
            text-align: center;
        }

        .qr-code {
            background: #f0f0f0;
            width: 160px;
            height: 160px;
            margin: 15px auto;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            color: #999;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .pricing-grid { grid-template-columns: 1fr; }
            .brand { left: 50%; transform: translateX(-50%); }
        }
    </style>
</head>
<body>

    <div class="brand">classtech</div>

    <div class="main-wrapper">
        <header>
            <h2>Escolha seu nível</h2>
            <p>Acesso instantâneo às ferramentas premium</p>
        </header>

        <div class="pricing-grid">
            <div class="plan-card" onclick="openPix('Bronze', '4,99')">
                <div class="plan-name">Bronze</div>
                <div class="plan-price">R$ 4,99 <span>/mês</span></div>
                <ul class="features">
                    <li>ClassBot + Brain</li>
                    <li>2 IAs Desbloqueadas</li>
                </ul>
                <button class="btn-pay">Upgrade</button>
            </div>

            <div class="plan-card" onclick="openPix('Prata', '6,99')" style="border-color: #333;">
                <div class="plan-name">Prata</div>
                <div class="plan-price">R$ 6,99 <span>/mês</span></div>
                <ul class="features">
                    <li>Proxy Privado</li>
                    <li>Sem Anúncios</li>
                </ul>
                <button class="btn-pay">Upgrade</button>
            </div>

            <div class="plan-card" onclick="openPix('Ouro', '9,99')">
                <div class="plan-name">Ouro</div>
                <div class="plan-price">R$ 9,99 <span>/mês</span></div>
                <ul class="features">
                    <li>Tudo Liberado</li>
                    <li>Suporte Red</li>
                </ul>
                <button class="btn-pay">Upgrade</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="checkout">
        <div class="payment-box">
            <p style="font-size: 0.8rem; margin: 0; color: #666;">PAGAMENTO PIX</p>
            <h3 id="plan-label" style="margin: 5px 0 0 0;">Plano</h3>
            <div class="qr-code">QR CODE PIX</div>
            <p id="price-label" style="font-weight: 800; margin: 10px 0;"></p>
            <button onclick="closePix()" style="background: none; border: none; color: #888; cursor: pointer; font-size: 0.8rem;">Voltar</button>
        </div>
    </div>

    <script>
        function openPix(name, price) {
            document.getElementById('plan-label').innerText = name;
            document.getElementById('price-label').innerText = 'R$ ' + price;
            document.getElementById('checkout').style.display = 'flex';
        }
        function closePix() {
            document.getElementById('checkout').style.display = 'none';
        }
    </script>
</body>
</html>
